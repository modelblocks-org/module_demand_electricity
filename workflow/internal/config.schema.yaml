$schema: "https://json-schema.org/draft/2020-12/schema"
description: "Schema for user-provided configuration files."

$defs:
  iso_date:
    type: string
    format: date
    pattern: '^\d{4}-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])$'
    description: "Date in ISO 8601 format (YYYY-MM-DD)."

type: object
additionalProperties: false
properties:
  temporal_scope:
    type: object
    description: "The temporal scope of the simulation."
    properties:
      start:
        $ref: "#/$defs/iso_date"
        description: "Start date the simulation in ISO 8601 format (YYYY-MM-DD)."
      end:
        $ref: "#/$defs/iso_date"
        description: "End date the simulation in ISO 8601 format (YYYY-MM-DD)."
    required:
      - start
      - end
  use_load:
    type: string
    description: "The source of load data to use in the simulation. Options are 'entsoe_api' or 'entsoe_opsd'."
    enum:
      - "load_entsoe_api"
      - "load_entsoe_opsd"
