# Module Input-Output structure for automated doc. generation
resources:
  user:
    "token_entsoe.txt": User token for ENTSO-E API access.
    "countries.parquet": Country boundaries corresponding to the countries in the ENTSO-E dataset.
    "shapes_{name_shapes}.parquet": Custom shapes for spatial aggregation.
  automatic:
    "load_entsoe_opsd.parquet": Historic electricity demand time series from ENTSO-E via OPSD.
    "load_entsoe_api.parquet": Historic electricity demand time series from ENTSO-E API.
    "population.tif": Gridded population data.
    "population_clean.tif": Gridded population data, clipped and cleaned.
    "demand_electricity_raster.tif": Electricity demand disaggregated to raster.
    "demand_electricity_countries_profiles.parquet": Electricity demand profile per country.
    "load_entsoe_opsd.png": Plot of data gaps in ENTSO-E statistics for each country and year.
    "demand_electricity_raster_map.png": Map of annual electricity demand disaggregated to raster.
results:
  "demand_electricity_{name_shapes}_MW.parquet": Electricity demand profile per custom shape in units of MW.
  "demand_electricity_{name_shapes}_profiles.png": Profile of first shape's electricity demand.
  "demand_electricity_{name_shapes}_map.png": Map of annual electricity demand aggregated to custom shapes.
wildcards:
  name_shapes: Name of the custom shape is a wildcard to allow multiple outputs based on different shapes.
