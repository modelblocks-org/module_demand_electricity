# Module Input-Output structure for automated doc. generation
pathvars:
  snakemake_defaults:
    logs:
      default: "<logs>"
      description: location of rule log files.
    resources:
      default: "<resources>"
      description: "location of module resource files."
    results:
      default: "<results>"
      description: "location of module results."

  user_resources:
    token_entsoe:
      default: "<resources>/user/token_entsoe.txt"
      description: "User token for ENTSO-E API access."
    countries:
      default: "<resources>/user/countries.parquet"
      description: Country boundaries corresponding to the countries in the ENTSO-E dataset.
    shapes:
      default: "<resources>/user/shapes_{shape}.parquet"
      description: Shapes to aggregate the output data to.
  results:
    demand_electricity_MW:
      default: "<results>/demand_electricity_{shape}_MW.parquet"
      description: Electricity demand profile per custom shape in units of MW.
    demand_electricity_profiles:
      default: "<results>/demand_electricity_{shape}_profiles.png"
      description: Plot of profile of first shape's electricity demand.
    demand_electricity_map:
      default: "<results>/demand_electricity_{shape}_map.png"
      description: Map of annual electricity demand aggregated to custom shapes.
wildcards:
  shape: Name of the custom shape is a wildcard to allow multiple outputs based on different shapes.
